<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Poker</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10b981">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" sizes="32x32" href="logo-32.png">
  <link rel="apple-touch-icon" href="logo.png">
  <script>
    // Anti-FOUC: apply the persisted (or system) theme before Angular boots, so
    // there's no light→dark flash on load. ThemeService reconciles afterwards.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark-mode');
      } catch (e) {}
    })();
  </script>
  <!-- Cloudflare Turnstile (captcha register/forgot/magic-link). Inerte tant que
       window.__POKER__.turnstileSiteKey est vide (host whitelisté dans la CSP). -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
