# Delegation Poker frontend (Angular SPA) — nginx vhost for poker.foxugly.com.
#
# TLS: shared WILDCARD *.foxugly.com cert (DNS-01), referenced directly — NO
# per-subdomain certbot (§3.6). Runtime config comes from SSM via the snippet
# below (written by fetch-frontend-runtime-from-ssm.sh) and is injected into
# index.html as window.__POKER__ via sub_filter, read by core/runtime-config.ts.
# The SPA calls poker-api.foxugly.com cross-origin (CORS allowlisted) and opens a
# WebSocket to wss://poker-api.foxugly.com/ws/ (the fleet's only WS site).

server {
    listen 80;
    server_name poker.foxugly.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name poker.foxugly.com;

    ssl_certificate     /etc/letsencrypt/live/foxugly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/django_websites/Poker_frontend/dist/Poker_frontend/browser;
    index index.html;

    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Empty defaults so the page boots even before the first SSM fetch; the
    # runtime-fetch script writes the snippet that overrides these.
    set $poker_api_base       "";
    set $poker_sentry_dsn     "";
    set $poker_sentry_env     "production";
    set $poker_sentry_release "";
    set $poker_csp_report     "";   # "; report-uri <sentry>" written by the fetch script
    include /etc/nginx/snippets/poker-frontend-runtime*.conf;   # glob tolerates absence

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
        expires 0;

        # Nonce-based CSP (AOT build ⇒ no unsafe-inline/eval). The only inline
        # script is the runtime-config block below, carrying $request_id as nonce
        # (reused in the header). connect-src: the API + its WebSocket + Sentry
        # ingest. img-src adds the API origin (card background images / backs).
        # inlineCritical is disabled in the build so there is no CSS-onload inline
        # handler to allow (avoids the foxugly script-src-attr pitfall).
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'nonce-$request_id'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://poker-api.foxugly.com; font-src 'self' data:; connect-src 'self' https://poker-api.foxugly.com wss://poker-api.foxugly.com https://*.ingest.de.sentry.io; worker-src 'self' blob:$poker_csp_report" always;

        gzip on;
        sub_filter '</head>' '<script nonce="$request_id">window.__POKER__={apiBaseUrl:"$poker_api_base",sentry:{dsn:"$poker_sentry_dsn",environment:"$poker_sentry_env",release:"$poker_sentry_release"}};</script></head>';
        sub_filter_once on;
    }

    # i18n catalogs are NOT content-hashed → never serve stale after a deploy.
    location ~* ^/i18n/.+\.json$ {
        add_header Cache-Control "no-cache" always;
        etag on;
        try_files $uri =404;
    }

    # Hashed bundles: immutable long cache. brotli_static/gzip_static gracefully
    # fall back to the plain file when no .br/.gz exists.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        brotli_static on;
        gzip_static on;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    access_log /var/log/nginx/poker-frontend-access.log;
    error_log  /var/log/nginx/poker-frontend-error.log;
}
