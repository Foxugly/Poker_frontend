name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Keyed by ref so a PR's runs never queue behind (or cancel) a main deploy.
  # Superseded PR runs are cancelled; main deploys always run to completion.
  group: poker-frontend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build (validate compile)
        run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # mint the OIDC token to assume the deploy role
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Verify build output
        run: test -f dist/Poker_frontend/browser/index.html

      - name: Package bundle
        id: pkg
        run: |
          tar -czf frontend-build.tar.gz -C dist/Poker_frontend/browser .
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # Human version for the footer: short sha + build date (UTC).
          echo "version=$(git rev-parse --short HEAD) ($(date -u +%Y-%m-%d))" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp frontend-build.tar.gz \
            "s3://${{ secrets.S3_DEPLOY_BUCKET }}/builds/poker-frontend/${{ steps.pkg.outputs.sha }}.tar.gz"

      - name: Deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          BUCKET: ${{ secrets.S3_DEPLOY_BUCKET }}
          SHA: ${{ steps.pkg.outputs.sha }}
          FE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          # AWS-RunShellScript runs as ROOT under dash. Installs config from the
          # COMMITTED git blob (never the django tree, §3.10) using `git -c
          # safe.directory` inline (no $HOME needed), pulls the S3 bundle via the
          # instance role (blank certbot creds), atomic-swaps the docroot, runs
          # the runtime-fetch (writes the SSM snippet), and reloads nginx.
          APP=/var/www/django_websites/Poker_frontend
          DOC="$APP/dist/Poker_frontend/browser"
          GB="git -C $APP -c safe.directory=$APP show origin/main"
          cat > /tmp/ssm-params.json <<EOF
          { "commands": [
            "chown -R django:www-data $APP",
            "sudo -u django bash -c 'umask 027; cd $APP && git fetch --quiet origin main && git reset --hard --quiet origin/main'",
            "$GB:deploy/systemd/poker-frontend-runtime-fetch.service > /etc/systemd/system/poker-frontend-runtime-fetch.service",
            "$GB:deploy/fetch-frontend-runtime-from-ssm.sh > /usr/local/sbin/poker-frontend-runtime-fetch.sh && chmod 0755 /usr/local/sbin/poker-frontend-runtime-fetch.sh && chown root:root /usr/local/sbin/poker-frontend-runtime-fetch.sh",
            "$GB:deploy/nginx/poker-frontend.conf > /etc/nginx/sites-available/poker-frontend.conf && ln -sf /etc/nginx/sites-available/poker-frontend.conf /etc/nginx/sites-enabled/poker-frontend.conf",
            "systemctl daemon-reload && systemctl enable --quiet poker-frontend-runtime-fetch",
            "env AWS_SHARED_CREDENTIALS_FILE=/dev/null AWS_CONFIG_FILE=/dev/null aws s3 cp s3://$BUCKET/builds/poker-frontend/$SHA.tar.gz /tmp/pokerfe.tar.gz --region eu-west-1",
            "rm -rf /tmp/pokerfe && mkdir -p /tmp/pokerfe && tar -xzf /tmp/pokerfe.tar.gz -C /tmp/pokerfe && mkdir -p $DOC && rsync -a --delete /tmp/pokerfe/ $DOC/ && rm -rf /tmp/pokerfe /tmp/pokerfe.tar.gz",
            "systemctl restart poker-frontend-runtime-fetch",
            "echo 'set \$poker_version \"$FE_VERSION\";' > /etc/nginx/snippets/poker-frontend-runtime-version.conf",
            "nginx -t && systemctl reload nginx",
            "chown -R django:www-data $APP && chmod -R g-w,o-rwx $APP"
          ], "executionTimeout": ["900"] }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy poker-frontend ${{ github.sha }}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success) aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text; exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out"; exit 1

      - name: Smoke test
        run: |
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error --max-time 30 -I https://poker.foxugly.com/ > /dev/null; then
              echo "Deployment OK (attempt $attempt)"; exit 0
            fi
            echo "attempt $attempt failed, retrying in 5s..."; sleep 5
          done
          echo "Smoke test failed"; exit 1
